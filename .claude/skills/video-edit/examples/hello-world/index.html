<!doctype html>
<html lang="en" data-resolution="square">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #0b0b10;
        font-family: "Inter", system-ui, sans-serif;
      }
      #root {
        position: relative;
        width: 1080px;
        height: 1080px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        color: #f5f5f7;
      }
      /* soft neo-lime accent bar behind the title */
      #accent {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 520px;
        height: 520px;
        margin: -260px 0 0 -260px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(207, 255, 5, 0.16) 0%, rgba(207, 255, 5, 0) 70%);
        filter: blur(8px);
      }
      #title {
        font-size: 128px;
        font-weight: 800;
        letter-spacing: -3px;
        text-align: center;
        line-height: 1.02;
      }
      #title .accent { color: #cfff05; }
      #subtitle {
        font-size: 44px;
        font-weight: 500;
        color: #b8b8c4;
        text-align: center;
      }
      #tag {
        position: absolute;
        bottom: 96px;
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: #6f6f80;
      }
    </style>
  </head>
  <body>
    <!--
      Hello-world composition for the avenOS video-edit skill.
      Pure text + GSAP. ~5s, 1920x1080. No external assets.
      See script.md for the screenplay this renders.
    -->
    <div
      id="root"
      data-composition-id="hello-world"
      data-start="0"
      data-duration="5"
      data-width="1080"
      data-height="1080"
    >
      <div id="accent" class="clip" data-start="0" data-duration="5" data-track-index="0"></div>

      <h1 id="title" class="clip" data-start="0" data-duration="5" data-track-index="1">
        Hello, <span class="accent">avenSKILLS</span>
      </h1>

      <p id="subtitle" class="clip" data-start="0.6" data-duration="4.4" data-track-index="2">
        Your first Hyperframes clip
      </p>

      <p id="tag" class="clip" data-start="1.4" data-duration="3.6" data-track-index="3">
        rendered locally · HTML + GSAP → mp4
      </p>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#accent", { opacity: 0, scale: 0.6, duration: 0.8, ease: "power2.out" }, 0);
      tl.from("#title", { opacity: 0, y: -60, duration: 0.9, ease: "power3.out" }, 0.1);
      tl.from("#subtitle", { opacity: 0, y: 30, duration: 0.8, ease: "power2.out" }, 0.6);
      tl.from("#tag", { opacity: 0, duration: 0.8, ease: "power1.out" }, 1.4);
      // gentle breathing on the title so the hold isn't static
      tl.to("#title", { scale: 1.04, duration: 3.0, ease: "sine.inOut" }, 1.0);

      window.__timelines["hello-world"] = tl;
    </script>
  </body>
</html>
