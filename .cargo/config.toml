# AvenOS — single Cargo target for the whole repo (not overridable per crate).
# All builds: app, aven-db, verify gates, dev 2x → target/rust/
[build]
target-dir = "target/rust"
incremental = true
# NOTE: the shared compiler cache (sccache) is intentionally NOT configured here.
# This file ships in the Sprite deploy source tarball and is read by CI / other
# devs, none of which have sccache installed — a committed `rustc-wrapper` would
# break those builds with "sccache not found". sccache lives in the per-machine
# `~/.cargo/config.toml` instead (see docs/RustBuildEfficiency.md).
