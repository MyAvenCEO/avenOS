name: release-next

# CalVer staging channel. On merge into `next` (deploy-relay + release-macos run in
# parallel after the tag is cut):
#   1. release       — derive YY.M.micro-next.N, stamp every package, changelog, tag, prerelease.
#   2. deploy-relay  — rebuild + restart the aven-node relay on its Sprite at the release commit
#                      (NEVER wipes — schema changes ride the migration/lens architecture; wipe
#                      is a manual-only recovery via WIPE=1).
#   3. release-macos — build the signed Mac App Store .pkg on a macOS runner and upload it to
#                      TestFlight (CFBundleVersion = github.run_number). Apple creds are
#                      REPOSITORY secrets (cross-channel: next AND main); see job for the list.

on:
  push:
    branches: [next]

concurrency:
  group: release-next
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: tag + changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "aven-release-bot"
          git config user.email "release@aven.os"

      - name: Derive CalVer, stamp, changelog, tag, prerelease
        run: bun run release:next
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-relay:
    name: deploy aven-node relay (Sprite)
    needs: release
    runs-on: ubuntu-latest
    # Pull AVEN_SIGNER_SECRET + SPRITE_API_KEY from the `next` GitHub Environment.
    environment: next
    steps:
      - name: Checkout next at the release commit (full history)
        uses: actions/checkout@v5
        with:
          ref: next
          fetch-depth: 0

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Install the sprite CLI
        run: |
          curl -fsSL https://sprites.dev/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Authenticate sprite CLI
        run: sprite auth setup --token "$SPRITE_API_KEY"
        env:
          SPRITE_API_KEY: ${{ secrets.SPRITE_API_KEY }}

      - name: Deploy relay at the release commit (restart, never wipe)
        # Ships a source tarball of the release commit to the Sprite, rebuilds aven-node,
        # and restarts the service (preserves the durable store). Blocks ~10–15 min on the
        # on-Sprite cargo build so a failed deploy surfaces here. WIPE is deliberately unset.
        run: bun ./scripts/deploy-aven-node-sprite.ts
        env:
          AVEN_SIGNER_SECRET: ${{ secrets.AVEN_SIGNER_SECRET }}
          # Build from the checked-out HEAD (the release/bump commit the tag points to),
          # so the relay's schema hash matches what the apps will ship from the same commit.
          AVEN_SERVER_BUILD: "1"

  release-macos:
    name: macOS build → TestFlight
    needs: release
    runs-on: macos-15 # Apple Silicon (free on public repos); builds the aarch64 .app
    # Apple credentials are REPOSITORY secrets (cross-channel — they sign next AND main),
    # so this job is intentionally NOT scoped to the `next` environment.
    steps:
      - name: Checkout next at the release commit (full history + tags)
        uses: actions/checkout@v5
        with:
          ref: next
          fetch-depth: 0

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Import signing certs into a temporary keychain
        env:
          DIST_P12_B64: ${{ secrets.APPLE_DISTRIBUTION_P12_BASE64 }}
          DIST_P12_PW: ${{ secrets.APPLE_DISTRIBUTION_P12_PASSWORD }}
          INSTALLER_P12_B64: ${{ secrets.APPLE_INSTALLER_P12_BASE64 }}
          INSTALLER_P12_PW: ${{ secrets.APPLE_INSTALLER_P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/aven-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$DIST_P12_B64" | base64 -d > "$RUNNER_TEMP/dist.p12"
          echo "$INSTALLER_P12_B64" | base64 -d > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN" -P "$DIST_P12_PW" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security import "$RUNNER_TEMP/installer.p12" -k "$KEYCHAIN" -P "$INSTALLER_P12_PW" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security default-keychain -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/dist.p12" "$RUNNER_TEMP/installer.p12"

      - name: Materialize provisioning profile + App Store Connect API key
        env:
          PROFILE_B64: ${{ secrets.MACOS_PROVISIONPROFILE_BASE64 }}
          API_KEY_B64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/apple"
          echo "$PROFILE_B64" | base64 -d > "$RUNNER_TEMP/apple/mac-app-store.provisionprofile"
          echo "$API_KEY_B64" | base64 -d > "$RUNNER_TEMP/apple/AuthKey_${APPLE_API_KEY}.p8"
          # altool requires the key file named AuthKey_<KEYID>.p8 (release-app.ts checks this).
          {
            echo "AVEN_APP_STORE_PROVISIONING_PROFILE_MACOS=$RUNNER_TEMP/apple/mac-app-store.provisionprofile"
            echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/apple/AuthKey_${APPLE_API_KEY}.p8"
          } >> "$GITHUB_ENV"

      - name: Build signed .pkg + upload to TestFlight
        # CFBundleVersion = run number (monotonic, unique → Apple won't reject a dup). The
        # marketing version comes from the CalVer-stamped tauri.conf.json on this commit.
        run: bun run release:app:mac ${{ github.run_number }}
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          AVEN_PKG_INSTALLER_IDENTITY: ${{ secrets.AVEN_PKG_INSTALLER_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
