<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Aufgaben — Aven</title>
		<style>
			:root {
				/* Outer page background — clean near-white that visually approximates
				   the docs-card surface (Tailwind `bg-white/10` over the cream page,
				   #F8F6EF) used by the Display panel iframe wrapper in app. The
				   Display panel layers `bg-white/10` over the page cream and renders
				   as a subtle translucent near-white; vibe apps inside the iframe have
				   no parent transparency, so this is a literal hex chosen to match
				   that perceived tone. Slightly cooler/cleaner than the legacy
				   eggshell display surface (#F9F5E6, `--color-surface-soft` in
				   app) — that token is no longer used by the active panel and
				   has been replaced by the docs-card tone here for visual parity.
				   Hard-coded because vibe apps are bundled into the sandbox
				   independently of app's CSS variables. */
				--bg-a: #FBFAF6;
				--tech-fill: rgba(255, 255, 255, 0.1);
				--tech-fill-inner: rgba(255, 255, 255, 0.15);
				--text: var(--color-text-primary, #1a1a1a);
				--muted: var(--color-text-secondary, rgba(26, 26, 26, 0.45));
				--border: var(--color-border-primary, rgba(0, 0, 0, 0.1));
				--border-soft: color-mix(in srgb, var(--border) 35%, transparent);
				--hitl-dash: color-mix(in srgb, var(--text) 20%, transparent);
				--row-divider: color-mix(in srgb, var(--border) 55%, transparent);
				--brand-accent: var(--color-ring-info, #e6b34d);
				--radius-2xl: var(--border-radius-2xl, 2rem);
				--radius-md: var(--border-radius-md, 1rem);
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				min-height: 100%;
				height: 100%;
			}
			body {
				font-family: var(--font-sans, "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif);
				background: var(--bg-a);
				color: var(--text);
				letter-spacing: -0.02em;
			}
			#doc-root {
				min-height: 100%;
				width: 100%;
				margin: 0;
				padding: 0;
			}
			.td-ui-container {
				min-height: 100%;
				padding: 1.25rem 1.5rem;
				border-radius: var(--radius-2xl);
				background: var(--tech-fill);
				border: none;
				display: flex;
				flex-direction: column;
				box-sizing: border-box;
			}
			.td-card {
				background: var(--tech-fill);
				border: 1px dashed var(--hitl-dash);
				border-radius: var(--radius-2xl);
				padding: 18px 20px;
				margin-bottom: 16px;
			}
			.td-card:last-child {
				margin-bottom: 0;
			}
			.td-card h4 {
				margin: 0 0 10px 0;
				font-size: 10px;
				font-weight: 700;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.12em;
				opacity: 0.55;
			}
			.td-banner-grid {
				display: grid;
				grid-template-columns: 1fr auto;
				gap: 12px 24px;
				align-items: end;
			}
			@media (max-width: 560px) {
				.td-banner-grid {
					grid-template-columns: 1fr;
				}
			}
			.td-eyebrow {
				display: block;
				font-size: 10px;
				font-weight: 700;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.08em;
				opacity: 0.55;
				margin-bottom: 6px;
			}
			.td-banner-title {
				margin: 0;
				font-size: 1.1rem;
				font-weight: 800;
				letter-spacing: -0.02em;
				color: var(--text);
				line-height: 1.2;
			}
			.td-field-label {
				display: block;
				font-size: 9px;
				font-weight: 700;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.06em;
				margin-bottom: 4px;
			}
			.td-banner-stat {
				text-align: right;
			}
			.td-banner-stat .td-field-label {
				text-align: right;
			}
			@media (max-width: 560px) {
				.td-banner-stat,
				.td-banner-stat .td-field-label {
					text-align: left;
				}
			}
			.td-banner-accent {
				font-size: 1.35rem;
				font-weight: 800;
				font-family: ui-monospace, Menlo, monospace;
				font-variant-numeric: tabular-nums;
				color: var(--brand-accent);
				line-height: 1.15;
			}
			.td-card--list {
				flex: 1;
				min-height: 0;
				display: flex;
				flex-direction: column;
				margin-bottom: 0;
			}
			.td-add-form {
				display: flex;
				gap: 10px;
				flex-wrap: wrap;
				align-items: stretch;
			}
			.td-input {
				flex: 1;
				min-width: 140px;
				font: inherit;
				color: inherit;
				background: var(--tech-fill-inner);
				border: 1px solid var(--border-soft);
				border-radius: var(--radius-md);
				padding: 0.55rem 0.85rem;
				outline: none;
			}
			.td-input:focus {
				border-color: var(--brand-accent);
				box-shadow: 0 0 0 2px color-mix(in srgb, var(--brand-accent) 28%, transparent);
			}
			.td-btn {
				font: inherit;
				cursor: pointer;
				border-radius: var(--radius-md);
				padding: 0.5rem 0.85rem;
				font-weight: 600;
				font-size: 0.8125rem;
				transition: background 0.15s ease, border-color 0.15s ease, filter 0.15s ease;
			}
			.td-btn--primary {
				background: var(--brand-accent);
				color: var(--text);
				border: 1px solid color-mix(in srgb, var(--text) 12%, transparent);
			}
			.td-btn--primary:hover {
				filter: brightness(1.03);
			}
			.td-btn--ghost {
				background: var(--tech-fill-inner);
				border: 1px solid var(--border-soft);
				color: var(--text);
			}
			.td-btn--ghost:disabled {
				opacity: 0.45;
				cursor: not-allowed;
			}
			.td-btn--icon {
				border: none;
				background: transparent;
				color: var(--muted);
				font-size: 1.25rem;
				line-height: 1;
				padding: 0.2rem 0.45rem;
				font-weight: 400;
			}
			.td-btn--icon:hover {
				color: #b45309;
			}
			.td-list {
				list-style: none;
				margin: 0;
				padding: 0;
				flex: 1;
				min-height: 120px;
				overflow-y: auto;
			}
			.td-list li.empty {
				text-align: center;
				color: var(--muted);
				padding: 1.5rem 1rem;
				font-size: 13px;
				border: 1px dashed var(--hitl-dash);
				border-radius: var(--radius-md);
				margin-top: 2px;
			}
			.td-row {
				display: flex;
				align-items: center;
				gap: 0.85rem;
				padding: 10px 4px;
				border-bottom: 1px solid var(--row-divider);
				animation: td-slide-in 0.18s ease-out;
			}
			.td-row:last-child {
				border-bottom: none;
			}
			.td-row input[type="checkbox"] {
				appearance: none;
				-webkit-appearance: none;
				width: 1.4rem;
				height: 1.4rem;
				margin: 0;
				flex-shrink: 0;
				border-radius: var(--radius-md);
				background: var(--tech-fill-inner);
				border: 1px solid var(--border-soft);
				cursor: pointer;
				display: grid;
				place-content: center;
				transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
			}
			.td-row input[type="checkbox"]:hover:not(:checked) {
				border-color: color-mix(in srgb, var(--brand-accent) 45%, var(--border-soft));
			}
			.td-row input[type="checkbox"]:focus-visible {
				outline: none;
				border-color: var(--brand-accent);
				box-shadow: 0 0 0 2px color-mix(in srgb, var(--brand-accent) 28%, transparent);
			}
			.td-row input[type="checkbox"]:checked {
				background: var(--brand-accent);
				border-color: color-mix(in srgb, var(--text) 14%, transparent);
			}
			.td-row input[type="checkbox"]::after {
				content: "";
				width: 0.32rem;
				height: 0.58rem;
				border: solid var(--text);
				border-width: 0 2px 2px 0;
				transform: rotate(45deg) translate(-0.5px, -1px);
				opacity: 0;
				box-sizing: content-box;
			}
			.td-row input[type="checkbox"]:checked::after {
				opacity: 1;
			}
			.td-row-text {
				flex: 1;
				outline: none;
				padding: 0.2rem 0.35rem;
				border-radius: 0.35rem;
				font-size: 13px;
				white-space: pre-wrap;
				word-break: break-word;
			}
			.td-row-text:focus {
				background: color-mix(in srgb, var(--brand-accent) 14%, transparent);
			}
			.td-row.done .td-row-text {
				text-decoration: line-through;
				color: var(--muted);
			}
			.td-list-footer {
				display: flex;
				justify-content: flex-end;
				margin-top: 12px;
				padding-top: 12px;
				border-top: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
				flex-shrink: 0;
			}
			@keyframes td-slide-in {
				from { opacity: 0; transform: translateY(-3px); }
				to { opacity: 1; transform: translateY(0); }
			}
		</style>
	</head>
	<body>
		<div id="doc-root">
			<main class="td-ui-container">
				<section class="td-card">
					<div class="td-banner-grid">
						<div>
							<span class="td-eyebrow">Aufgabenliste</span>
							<h1 id="title" class="td-banner-title">Aufgaben</h1>
						</div>
						<div class="td-banner-stat">
							<span class="td-field-label">Offen</span>
							<div id="count" class="td-banner-accent">0 von 0</div>
						</div>
					</div>
				</section>

				<section class="td-card">
					<h4>Neu</h4>
					<form id="add-form" class="td-add-form">
						<input id="add-input" class="td-input" type="text"
							placeholder="Aufgabe beschreiben …" required autocomplete="off" />
						<button class="td-btn td-btn--primary" type="submit">Hinzufügen</button>
					</form>
				</section>

				<section class="td-card td-card--list">
					<h4>Einträge</h4>
					<ul id="list" class="td-list"></ul>
					<div class="td-list-footer">
						<button id="clear-done-btn" class="td-btn td-btn--ghost" type="button">
							Erledigte löschen
						</button>
					</div>
				</section>
			</main>
		</div>

		<script type="module">
			;(async () => {
			const extOrigin = window.parent?.location?.origin ?? window.location.origin
			const { App } = await import(`${extOrigin}/ext-apps.js`)

			const $ = (id) => {
				const el = document.getElementById(id)
				if (!el) throw new Error(`Missing #${id}`)
				return el
			}
			const $title = $('title')
			const $list = $('list')
			const $count = $('count')
			const $form = $('add-form')
			const $input = $('add-input')
			const $clearDone = $('clear-done-btn')

			const state = { title: 'Aufgaben', todos: [] }
			const uid = () => Math.random().toString(36).slice(2, 10)

			const app = new App({ name: 'Aven Todos', version: '1.0.0' })

			function render() {
				$title.textContent = state.title
				$list.innerHTML = ''
				if (state.todos.length === 0) {
					const li = document.createElement('li')
					li.className = 'empty'
					li.textContent = 'Noch keine Aufgaben — oben hinzufügen.'
					$list.appendChild(li)
				} else {
					for (const t of state.todos) {
						const li = document.createElement('li')
						li.className = `td-row${t.done ? ' done' : ''}`
						li.dataset.id = t.id
						li.innerHTML = `
							<input type="checkbox" ${t.done ? 'checked' : ''} aria-label="Als erledigt markieren">
							<span class="td-row-text" contenteditable="plaintext-only" spellcheck="false"></span>
							<button class="td-btn td-btn--icon delete" aria-label="Löschen">×</button>`
						li.querySelector('.td-row-text').textContent = t.text
						$list.appendChild(li)
					}
				}
				const remaining = state.todos.filter((t) => !t.done).length
				$count.textContent = `${remaining} von ${state.todos.length} offen`
				$clearDone.disabled = !state.todos.some((t) => t.done)
			}

			async function pushModelContext() {
				await app.updateModelContext({
					structuredContent: { title: state.title, todos: state.todos },
					content: [
						{
							type: 'text',
							text: `${state.todos.filter((t) => !t.done).length} von ${state.todos.length} Aufgaben offen.`
						}
					]
				})
			}

			function applyConfig(cfg) {
				if (!cfg) return
				if (typeof cfg.title === 'string') state.title = cfg.title
				if (Array.isArray(cfg.items)) {
					state.todos = cfg.items.map((it) => ({
						id: it.id ?? uid(),
						text: it.text ?? '',
						done: !!it.done
					}))
				}
				render()
				void pushModelContext()
			}

			$form.addEventListener('submit', (e) => {
				e.preventDefault()
				const text = $input.value.trim()
				if (!text) return
				state.todos.push({ id: uid(), text, done: false })
				$input.value = ''
				render()
				void pushModelContext()
			})

			$list.addEventListener('change', (e) => {
				const t = e.target
				if (t.type !== 'checkbox') return
				const li = t.closest('.td-row')
				const todo = state.todos.find((x) => x.id === li?.dataset.id)
				if (!todo) return
				todo.done = t.checked
				render()
				void pushModelContext()
			})

			$list.addEventListener('click', (e) => {
				if (!e.target.classList?.contains('delete')) return
				const li = e.target.closest('.td-row')
				state.todos = state.todos.filter((x) => x.id !== li?.dataset.id)
				render()
				void pushModelContext()
			})

			$list.addEventListener('input', (e) => {
				const t = e.target
				if (!t.classList?.contains('td-row-text')) return
				const li = t.closest('.td-row')
				const todo = state.todos.find((x) => x.id === li?.dataset.id)
				if (!todo) return
				todo.text = (t.textContent ?? '').trim()
				void pushModelContext()
			})

			$clearDone.addEventListener('click', () => {
				state.todos = state.todos.filter((t) => !t.done)
				render()
				void pushModelContext()
			})

			app.ontoolinput = (p) => applyConfig(p.arguments)
			app.ontoolresult = (r) => {
				if (r.structuredContent) applyConfig(r.structuredContent)
			}

			await app.connect()
			render()
			void pushModelContext()
			})().catch((err) => {
				console.error('[vibe-app todos]', err)
				const r = document.getElementById('doc-root')
				if (r) {
					r.innerHTML =
						'<main class="td-ui-container"><div class="td-card" style="color:#b91c1c">Vorschau konnte nicht starten: ' +
						String(err?.message ?? err) +
						'</div></main>'
				}
			})
		</script>
	</body>
</html>
