<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Vibe App sandbox</title>
		<style>
			body {
				display: flex;
				flex-direction: column;
				margin: 0;
				height: 100vh;
				width: 100vw;
				background-color: transparent;
			}
			* {
				box-sizing: border-box;
			}
			/* Chrome lives on .vibe-shell — keep iframes borderless for reliable nested rendering. */
			.vibe-shell iframe {
				display: block;
				width: 100%;
				flex: 1;
				min-height: 0;
				margin: 0;
				padding: 0;
				border: 0 none transparent;
				background-color: transparent;
				color-scheme: inherit;
			}
		</style>
	</head>
	<body>
		<script type="module" src="./sandbox.ts"></script>
	</body>
</html>
