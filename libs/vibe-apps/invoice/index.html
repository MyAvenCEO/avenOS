<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Rechnung — Aven</title>
		<style>
			:root {
				--bg-a: var(--color-background-primary, #e8ede1);
				--bg-b: color-mix(in srgb, var(--bg-a) 82%, rgb(255 255 255));
				--tech-fill: rgba(255, 255, 255, 0.1);
				--tech-fill-inner: rgba(255, 255, 255, 0.15);
				--foreground-10: color-mix(in srgb, var(--text) 10%, transparent);
				--hitl-dash: color-mix(in srgb, var(--text) 20%, transparent);
				--surface-fill: var(--tech-fill);
				--surface-2: var(--tech-fill-inner);
				--surface-raised: var(--tech-fill-inner);
				--border: var(--color-border-primary, rgba(0, 0, 0, 0.1));
				--border-strong: rgba(0, 0, 0, 0.14);
				--border-soft: color-mix(in srgb, var(--border) 35%, transparent);
				--muted: var(--color-text-secondary, rgba(26, 26, 26, 0.45));
				--text: var(--color-text-primary, #1a1a1a);
				--brand-accent: var(--color-ring-info, #e6b34d);
				--banner-divider: color-mix(in srgb, var(--text) 12%, transparent);
				--row-divider: color-mix(in srgb, var(--border) 55%, transparent);
				--radius-2xl: var(--border-radius-2xl, 2rem);
				--radius-md: var(--border-radius-md, 1rem);
			}
			*, *::before, *::after { box-sizing: border-box; }
			html, body { margin: 0; min-height: 100%; height: 100%; }
			body {
				font-family: var(--font-sans, 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
				background: var(--bg-a);
				color: var(--text);
			}
			#doc-root { min-height: 100%; width: 100%; margin: 0; padding: 0; }
			.invoice-ui-container {
				padding: 1.25rem 1.5rem;
				border-radius: var(--radius-2xl);
				background: var(--tech-fill);
				border: none;
			}
			.invoice-grid {
				display: grid; gap: 16px;
				grid-template-columns: 1fr 1fr;
				margin-bottom: 16px;
			}
			@media (max-width: 760px) { .invoice-grid { grid-template-columns: 1fr; } }
			.invoice-card {
				background: var(--tech-fill);
				border: 1px dashed var(--hitl-dash);
				border-radius: var(--radius-2xl);
				padding: 18px 20px;
			}
			.invoice-card h4 {
				margin: 0 0 8px 0;
				font-size: 10px; font-weight: 700;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.12em;
				opacity: 0.55;
			}
			.invoice-card .big { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
			.inv-party-name-text {
				text-decoration: underline;
				text-decoration-color: color-mix(in srgb, var(--text) 22%, transparent);
				text-underline-offset: 2px;
			}
			.inv-party-address-block { margin-top: 6px; }
			.inv-party-address-block .line.inv-party-addr-line { display: block; margin-top: 4px; }
			.inv-party-address-block .line.inv-party-addr-line:first-child { margin-top: 0; }
			.invoice-card .inv-party-name-line:has(+ .party-representative-line) { margin-bottom: 0; }
			.party-representative-line {
				margin-top: 4px;
				display: flex; flex-direction: column; gap: 0;
				line-height: 1.35;
			}
			.party-representative-sublabel {
				font-size: 11px; font-weight: 600;
				margin: 0; line-height: 1.25;
				text-transform: none;
				letter-spacing: normal;
			}
			.inv-party-rep-name {
				font-size: 13px;
				color: var(--text);
				line-height: 1.35;
				margin: 0;
			}
			.party-representative-line + .inv-party-address-block { margin-top: 4px; }
			.invoice-card .line { font-size: 13px; color: var(--text); margin-top: 2px; white-space: pre-wrap; word-break: break-word; }
			.invoice-card .muted { color: var(--muted); font-size: 12px; margin-top: 2px; }
			.party-org-id-line {
				margin-top: 8px; margin-bottom: 0;
				font-size: 12px; line-height: 1.4;
				color: var(--muted); font-weight: 400;
			}
			.invoice-card .party-org-id-line + .party-org-id-line { margin-top: 4px; }
			.party-org-id-line .party-org-id-label { font-weight: 500; color: var(--muted); }
			.party-org-id-line .party-org-id-value { font-weight: 500; color: var(--text); font-size: inherit; }

			.invoice-doc-banner {
				background: var(--tech-fill-inner);
				border: 1px dashed var(--hitl-dash);
				border-radius: var(--radius-2xl);
				padding: 14px 20px;
				margin-bottom: 16px;
				font-size: 13px;
			}
			.inv-banner-hero-row {
				display: grid;
				grid-template-columns: 1fr auto;
				gap: 12px 28px;
				align-items: end; width: 100%;
			}
			.inv-banner-hero-row.inv-banner-hero-only-right { grid-template-columns: 1fr; justify-items: end; }
			@media (max-width: 560px) {
				.inv-banner-hero-row { grid-template-columns: 1fr; }
				.inv-banner-hero-row.inv-banner-hero-only-right { justify-items: start; }
				.inv-banner-hero-right { text-align: left !important; }
			}
			.inv-banner-value {
				font-size: 1.35rem; font-weight: 800;
				line-height: 1.2; color: var(--text);
				letter-spacing: -0.02em;
			}
			.inv-banner-value.inv-banner-money {
				font-family: ui-monospace, Menlo, monospace;
				font-variant-numeric: tabular-nums;
				color: var(--brand-accent);
			}
			.inv-banner-sublabel {
				font-size: 11px; font-weight: 700;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.06em;
				margin-top: 6px;
			}
			.inv-banner-hero-right { text-align: right; min-width: 0; }
			.inv-banner-fields-row {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
				gap: 12px 20px;
				margin-top: 12px;
				padding-top: 10px;
				border-top: 1px solid var(--banner-divider);
				align-items: start;
			}
			.inv-banner-field { min-width: 0; }
			.inv-banner-value.inv-banner-field-value {
				font-size: 1.05rem;
				font-weight: 700;
				line-height: 1.3;
				color: var(--text);
				word-break: break-word;
			}
			.inv-banner-mid {
				display: grid;
				grid-template-columns: minmax(0, 1fr) auto;
				align-items: end;
				gap: 12px 20px;
				margin-top: 12px;
				padding-top: 10px;
				border-top: 1px solid var(--banner-divider);
			}
			.inv-banner-mid--compact .inv-banner-mid-dates {
				display: flex;
				flex-wrap: wrap;
				justify-content: flex-end;
				align-items: end;
				gap: 8px 16px;
			}
			.inv-banner-mid--compact .inv-banner-mid-dates--merged {
				flex-wrap: nowrap;
				gap: 6px 12px;
				min-width: 0;
			}
			.inv-banner-mid--compact .inv-banner-mid-dates--merged .inv-banner-field { flex: 0 1 auto; min-width: 0; }
			@media (max-width: 720px) {
				.inv-banner-mid--compact .inv-banner-mid-dates--merged { flex-wrap: wrap; justify-content: flex-end; }
			}
			.inv-banner-mid--compact .inv-banner-mid-dates .inv-banner-field { text-align: right; }
			.inv-banner-mid--compact .inv-banner-mid-dates .inv-banner-field .inv-banner-field-value {
				font-size: 0.88rem; font-weight: 700;
			}
			.inv-banner-mid--compact .inv-banner-mid-dates .inv-banner-sublabel { font-size: 9px; margin-top: 2px; }
			.inv-banner-compact-value { font-size: 0.88rem; font-weight: 700; line-height: 1.3; color: var(--text); }
			.inv-banner-compact-sublabel {
				font-size: 9px; font-weight: 700;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.06em;
				margin-top: 3px;
			}
			@media (max-width: 560px) {
				.inv-banner-mid--compact { grid-template-columns: 1fr; }
				.inv-banner-mid--compact .inv-banner-mid-dates { justify-content: flex-start; text-align: left; }
				.inv-banner-mid--compact .inv-banner-mid-dates .inv-banner-field { text-align: left; }
			}

			.invoice-items-wrap {
				background: var(--tech-fill);
				border: 1px dashed var(--hitl-dash);
				border-radius: var(--radius-2xl);
				overflow: auto;
				margin-bottom: 16px;
			}
			.invoice-items-wrap--unified .invoice-items-cap {
				background: var(--tech-fill-inner);
				border-bottom: 1px solid var(--border-soft);
				padding: 12px 16px 10px;
				border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
			}
			.invoice-items-cap--statement { display: flex; flex-direction: column; gap: 8px; }
			.invoice-items-cap-title-row {
				display: flex;
				flex-wrap: wrap;
				align-items: baseline;
				justify-content: space-between;
				gap: 8px 20px;
			}
			.invoice-items-cap-title-row .invoice-cap-block--title { margin-bottom: 0; flex: 1 1 120px; min-width: 0; }
			.invoice-items-cap-subline { flex: 0 1 auto; max-width: 100%; text-align: right; }
			.invoice-items-cap-subline .invoice-cap-kv { justify-content: flex-end; }
			.invoice-items-cap-title-row--subline-only { justify-content: flex-end; }
			.invoice-items-cap-title-row--subline-only .invoice-items-cap-subline { text-align: right; }
			.invoice-items-cap--statement .invoice-cap-block--title {
				font-size: 15px; font-weight: 800;
				color: var(--text); letter-spacing: -0.01em;
				line-height: 1.35; margin-bottom: 2px;
			}
			.invoice-items-cap-title-row .invoice-cap-block--title { margin-bottom: 0; }
			.invoice-cap-kv {
				display: flex; flex-wrap: wrap;
				align-items: baseline;
				gap: 6px 10px;
				font-size: 12px; line-height: 1.4;
			}
			.invoice-cap-k {
				font-size: 10px; font-weight: 700;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--muted);
			}
			.invoice-cap-v { font-weight: 600; color: var(--text); }
			.invoice-items-wrap--unified .invoice-items { border-radius: 0 0 var(--radius-2xl) var(--radius-2xl); }
			.invoice-items-wrap--unified .invoice-items thead th { background: var(--surface-2); }
			.invoice-items {
				width: 100%;
				border-collapse: collapse;
				font-size: 13px;
			}
			.invoice-items thead th {
				text-align: left;
				background: var(--surface-2);
				padding: 10px 14px;
				border-bottom: 1px solid var(--border);
				font-weight: 700; font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.05em;
				color: var(--muted);
			}
			.invoice-items thead th.num {
				text-align: right;
				font-family: ui-monospace, Menlo, monospace;
				font-variant-numeric: tabular-nums;
			}
			.invoice-items tbody td {
				padding: 10px 14px;
				border-bottom: 1px solid var(--row-divider);
				vertical-align: top;
			}
			.invoice-items tbody tr:last-child td { border-bottom: none; }
			.invoice-items tr.inv-line-discount td { color: var(--muted); font-style: italic; }
			.inv-line-item-primary { font-weight: 600; color: var(--text); line-height: 1.35; }
			.inv-line-item-secondary {
				font-size: 12px;
				color: var(--muted);
				line-height: 1.4;
				margin-top: 3px;
			}
			.invoice-items td.num {
				text-align: right;
				font-family: ui-monospace, Menlo, monospace;
				font-variant-numeric: tabular-nums;
				white-space: nowrap;
			}
			.invoice-items td.idx { color: var(--muted); width: 32px; font-size: 11px; }

			.invoice-financials {
				margin-left: auto;
				max-width: 380px;
				min-width: 260px;
				background: var(--tech-fill);
				border: 1px dashed var(--hitl-dash);
				border-radius: var(--radius-2xl);
				font-size: 15px;
				margin-top: 12px;
				overflow: hidden;
			}
			.invoice-financials__section--totals { padding: 16px 20px 14px; }
			.invoice-financials__section--payments {
				border-top: 1px solid var(--border);
				padding: 14px 20px 16px;
			}
			.invoice-financials__section--payments .invoice-bundle-label { margin-bottom: 6px !important; }
			.invoice-totals--embedded {
				margin: 0; max-width: none; min-width: 0;
				padding: 0; border: none;
				background: transparent;
				border-radius: 0;
			}
			.invoice-financials__outstanding {
				border-top: 1px solid var(--border-soft);
				padding: 12px 20px 14px;
				background: var(--foreground-10);
			}
			.invoice-financials__outstanding .invoice-root-outstanding-inner {
				max-width: none; min-width: 0; width: 100%;
				border: none;
				background: transparent;
				border-radius: 0;
				padding: 0;
				display: flex;
				flex-direction: column;
				align-items: flex-end;
				gap: 4px;
			}
			.invoice-root-outstanding-label {
				font-size: 10px; font-weight: 800;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				color: var(--muted);
			}
			.invoice-root-outstanding-value {
				font-size: 1.1rem; font-weight: 800;
				font-family: ui-monospace, Menlo, monospace;
				font-variant-numeric: tabular-nums;
				color: var(--text);
			}
			.invoice-totals .row {
				display: flex;
				justify-content: space-between;
				align-items: baseline;
				gap: 12px 20px;
				padding: 6px 0;
				color: var(--muted);
			}
			.invoice-totals .row > span:first-child { min-width: 0; }
			.invoice-totals .inv-totals-line--subtotal,
			.invoice-totals .inv-totals-line--tax,
			.invoice-totals .inv-totals-line--tax-total-sum {
				font-size: 16px; line-height: 1.35; color: var(--muted);
			}
			.invoice-totals .inv-totals-line--subtotal .num,
			.invoice-totals .inv-totals-line--tax .num,
			.invoice-totals .inv-totals-line--tax-total-sum .num {
				font-size: 17px; font-weight: 700; color: var(--text);
			}
			.invoice-totals .inv-totals-line--tax .num,
			.invoice-totals .inv-totals-line--tax-total-sum .num { font-weight: 600; }
			.invoice-totals .inv-totals-line--tax-total-sum {
				border-top: 1px solid var(--border);
				margin-top: 4px;
				padding-top: 8px;
			}
			.invoice-totals .inv-totals-line--tax-rate {
				font-size: 14px;
				color: var(--muted);
				padding: 2px 0;
			}
			.invoice-totals .inv-totals-line--tax-rate .inv-totals-line__tax-labcell {
				display: flex; flex-direction: column; gap: 2px; min-width: 0;
			}
			.invoice-totals .inv-totals-line--tax-rate .inv-totals-line__tax-sub {
				font-size: 12px; font-weight: 400; line-height: 1.2; color: var(--muted);
			}
			.invoice-totals .inv-totals-line--tax-rate .num { font-weight: 500; color: var(--muted); }
			.invoice-totals .inv-totals-line--invoice-total {
				margin-top: 4px;
				padding-top: 12px;
				border-top: 2px solid var(--border-strong);
				color: var(--text);
			}
			.invoice-totals .inv-totals-line--invoice-total > span:first-child {
				font-size: 13px; font-weight: 800;
				text-transform: uppercase;
				letter-spacing: 0.04em;
				color: var(--muted);
			}
			.invoice-totals .inv-totals-line--invoice-total .num {
				font-size: 1.5rem; font-weight: 800;
				letter-spacing: -0.03em;
				color: var(--text);
				line-height: 1.15;
			}
			.invoice-totals .num {
				font-family: ui-monospace, Menlo, monospace;
				font-variant-numeric: tabular-nums;
			}
			.invoice-bundle-label {
				font-size: 10px; font-weight: 700;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.12em;
				opacity: 0.55;
				margin-bottom: 12px;
			}
		</style>
	</head>
	<body>
		<div id="doc-root">
			<div class="invoice-ui-container">
				<div class="empty-doc" style="padding: 2rem; text-align: center; color: var(--muted)">Lade …</div>
			</div>
		</div>

		<script type="module">
			;(async () => {
			// Inner iframe URL is often about:blank; parent is the sandbox frame (same origin as ext-apps.js).
			const extOrigin = window.parent?.location?.origin ?? window.location.origin
			const { App } = await import(`${extOrigin}/ext-apps.js`)

			const $root = document.getElementById('doc-root')
			let state = {}

			const cloneJson = (x) => JSON.parse(JSON.stringify(x))
			const isRecord = (x) => typeof x === 'object' && x !== null
			const esc = (s) => {
				if (s == null) return ''
				return String(s)
					.replace(/&/g, '&amp;')
					.replace(/</g, '&lt;')
					.replace(/>/g, '&gt;')
					.replace(/"/g, '&quot;')
			}
			const fmtNum = (n) => new Intl.NumberFormat('de-DE', { maximumFractionDigits: 2 }).format(n)
			const fmtDate = (s) => {
				if (s == null || typeof s !== 'string' || !s.trim()) return ''
				const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s.trim())
				if (m) {
					const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]))
					if (!Number.isNaN(d.getTime())) {
						return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })
					}
				}
				return s.trim()
			}
			const fmtMoney = (n, currency) => {
				if (n == null || typeof n !== 'number' || Number.isNaN(n)) return '–'
				try {
					return new Intl.NumberFormat('de-DE', { style: 'currency', currency: currency || 'EUR' }).format(n)
				} catch {
					return `${fmtNum(n)} ${currency}`
				}
			}

			function isInvoicePayload(x) {
				if (!isRecord(x)) return false
				const v = x.vendor, h = x.header, stmts = x.statements
				if (!isRecord(v) || typeof v.name !== 'string') return false
				if (!isRecord(h) || h.document_kind == null) return false
				return Array.isArray(stmts)
			}

			function invBannerField(valueHtml, labelHuman) {
				const lab = labelHuman.trim().toUpperCase()
				return `<div class="inv-banner-field"><div class="inv-banner-value inv-banner-field-value">${valueHtml}</div><div class="inv-banner-sublabel">${esc(lab)}</div></div>`
			}

			function renderPartyCard(party, roleTitle) {
				if (!isRecord(party)) return ''
				const name = typeof party.name === 'string' ? party.name : '–'
				const nameInner = `<span class="inv-party-name-text">${esc(name)}</span>`
				const contact = typeof party.contact_name === 'string' ? party.contact_name.trim() : ''
				const contactBlock = contact
					? `<div class="party-representative-line" role="group" aria-label="Ansprechpartner"><div class="party-representative-sublabel muted">Ansprechpartner</div><div class="inv-party-rep-name">${esc(contact)}</div></div>`
					: ''
				const street = typeof party.street === 'string' ? party.street : ''
				const pc = typeof party.postal_code === 'string' ? party.postal_code : ''
				const city = typeof party.city === 'string' ? party.city : ''
				const country = typeof party.country === 'string' ? party.country : ''
				const plzCity = [pc, city].filter(Boolean).join(' ')
				const addrBits = []
				if (street) addrBits.push(`<div class="line inv-party-addr-line" style="white-space:pre-line">${esc(street)}</div>`)
				if (plzCity) addrBits.push(`<div class="line inv-party-addr-line">${esc(plzCity)}</div>`)
				if (country) addrBits.push(`<div class="line muted inv-party-addr-line">${esc(country)}</div>`)
				const addressBlock = addrBits.length
					? `<div class="inv-party-address-block">${addrBits.join('')}</div>` : ''

				let idHtml = ''
				if (Array.isArray(party.identifiers)) {
					for (const row of party.identifiers) {
						if (!isRecord(row)) continue
						const v = row.value
						if (typeof v !== 'string' || !v.trim()) continue
						const lp = row.label_printed
						idHtml += `<div class="party-org-id-line">${lp ? `<span class="party-org-id-label">${esc(String(lp))}: </span>` : ''}<span class="party-org-id-value">${esc(v)}</span></div>`
					}
				}
				return `<div class="invoice-card">
					<h4>${esc(roleTitle)}</h4>
					<div class="big inv-party-name-line">${nameInner}</div>
					${contactBlock}
					${addressBlock}
					${typeof party.email === 'string' && party.email ? `<div class="muted">${esc(party.email)}</div>` : ''}
					${typeof party.phone === 'string' && party.phone ? `<div class="muted">${esc(party.phone)}</div>` : ''}
					${idHtml}
				</div>`
			}

			function renderTaxBreakdownRow(r, cur) {
				const p = r.tax_rate_percent
				const g = r.tax_group_letter != null && String(r.tax_group_letter).trim() !== ''
					? String(r.tax_group_letter).trim().charAt(0) : ''
				const tx = r.tax_rate_text != null && String(r.tax_rate_text).trim() !== ''
					? String(r.tax_rate_text).trim() : ''
				const hasPct = p != null && p !== '' && !Number.isNaN(Number(p))
				let lab = 'USt.'
				if (hasPct) {
					const n = Number(p)
					lab = `USt. ${fmtNum(n)}%`
					const letter = g && /^[A-Za-z]$/.test(g) ? g : (tx && /^[A-Za-z]$/.test(tx) ? tx : '')
					if (letter) lab = `${lab} (${letter})`
					else if (tx && !/^[A-Za-z]$/.test(tx) && !tx.startsWith(String(n))) {
						lab = `${lab} — ${tx}`
					}
				} else if (tx) {
					lab = `USt. ${tx}`
				}
				const amt = r.tax_amount != null && typeof r.tax_amount === 'number' ? fmtMoney(r.tax_amount, cur) : '–'
				const netGrossSub = r.net_subtotal != null || r.gross_subtotal != null
					? `<span class="inv-totals-line__tax-sub">${[
						r.net_subtotal != null ? `Netto ${fmtMoney(r.net_subtotal, cur)}` : null,
						r.gross_subtotal != null ? `Brutto ${fmtMoney(r.gross_subtotal, cur)}` : null
					].filter(Boolean).join(' · ')}</span>` : ''
				return `<div class="row inv-totals-line inv-totals-line--tax-rate"><span class="inv-totals-line__tax-labcell"><span class="inv-totals-line__tax-main">${esc(lab)}</span>${netGrossSub}</span><span class="num">${amt}</span></div>`
			}

			function renderLineRows(lineItems, cur) {
				if (!Array.isArray(lineItems)) return ''
				return lineItems.map((raw, i) => {
					if (!isRecord(raw)) return ''
					const kind = raw.line_kind != null && String(raw.line_kind).trim() !== ''
						? String(raw.line_kind).trim() : ''
					const trCls = kind ? `inv-line inv-line-${kind.replace(/[^a-z0-9_-]/gi, '_')}` : 'inv-line'
					const title = typeof raw.title === 'string' ? raw.title.trim() : ''
					const desc = typeof raw.description === 'string' ? raw.description.trim() : ''
					let descCell = ''
					if (title && desc) {
						descCell = `<div class="inv-line-item-primary">${esc(title)}</div><div class="inv-line-item-secondary">${esc(desc)}</div>`
					} else if (title) {
						descCell = `<div class="inv-line-item-primary">${esc(title)}</div>`
					} else {
						descCell = `<div class="inv-line-item-secondary">${esc(desc)}</div>`
					}
					const taxPct = raw.tax_rate_percent
					const g = raw.tax_group_letter != null && String(raw.tax_group_letter).trim() !== ''
						? String(raw.tax_group_letter).trim().charAt(0) : ''
					let taxCell = '–'
					if (taxPct != null && taxPct !== '' && !Number.isNaN(Number(taxPct))) {
						const main = `${fmtNum(Number(taxPct))}%`
						const extra = g && /^[A-Za-z]$/.test(g)
							? ` <span class="muted" title="POS tax group">(${esc(g)})</span>` : ''
						taxCell = `${main}${extra}`
					}
					return `<tr class="${trCls}">
						<td class="idx">${i + 1}</td>
						<td>${raw.position != null ? esc(raw.position) : ''}</td>
						<td>${raw.article_number != null ? esc(raw.article_number) : ''}</td>
						<td>${descCell}</td>
						<td class="num">${raw.quantity != null && typeof raw.quantity === 'number' ? fmtNum(raw.quantity) : esc(raw.quantity)}</td>
						<td>${raw.quantity_unit != null ? esc(raw.quantity_unit) : ''}</td>
						<td class="num">${fmtMoney(raw.unit_price, cur)}</td>
						<td class="num">${taxCell}</td>
						<td class="num">${fmtMoney(raw.amount, cur)}</td>
					</tr>`
				}).join('')
			}

			function renderEmbeddedTotals(totals, cur) {
				if (!isRecord(totals)) return ''
				const sub = totals.subtotal
				const tb = totals.tax_breakdown
				const taxTotal = totals.tax_total
				const invTotal = totals.invoice_total
				const hasBreakdown = Array.isArray(tb) && tb.length > 0
				let bdHtml = ''
				if (hasBreakdown) {
					for (const row of tb) {
						if (!isRecord(row)) continue
						bdHtml += renderTaxBreakdownRow(row, cur)
					}
				}
				let taxLabel = 'USt. gesamt'
				if (!hasBreakdown && typeof sub === 'number' && sub > 0 && typeof taxTotal === 'number' && taxTotal > 0) {
					const implied = (taxTotal / sub) * 100
					if (implied > 0.05 && implied < 99.95) {
						taxLabel = `USt. gesamt · ≈${fmtNum(Math.round(implied * 10) / 10)}%`
					}
				} else if (hasBreakdown && Array.isArray(tb) && tb.length === 1 && isRecord(tb[0])) {
					const p = tb[0].tax_rate_percent
					if (p != null && !Number.isNaN(Number(p))) {
						taxLabel = `USt. gesamt · ${fmtNum(Number(p))}%`
					}
				}
				const taxRowCls = hasBreakdown
					? 'row inv-totals-line inv-totals-line--tax-total-sum'
					: 'row inv-totals-line inv-totals-line--tax'
				const taxAmt = taxTotal != null ? fmtMoney(taxTotal, cur) : '–'
				const parts = []
				if (sub != null) {
					parts.push(`<div class="row inv-totals-line inv-totals-line--subtotal"><span>Zwischensumme (netto)</span><span class="num">${fmtMoney(sub, cur)}</span></div>`)
				}
				parts.push(bdHtml)
				parts.push(`<div class="${taxRowCls}"><span>${esc(taxLabel)}</span><span class="num">${taxAmt}</span></div>`)
				if (invTotal != null) {
					parts.push(`<div class="row inv-totals-line inv-totals-line--invoice-total"><span>Rechnungsbetrag</span><span class="num">${fmtMoney(invTotal, cur)}</span></div>`)
				}
				return parts.join('')
			}

			function renderPaymentsSection(payments, cur) {
				if (!Array.isArray(payments) || !payments.length) return ''
				const rows = payments.map((p) => {
					if (!isRecord(p)) return ''
					const bits = []
					if (p.date) bits.push(`<strong>${esc(fmtDate(p.date))}</strong>`)
					if (p.method) {
						const m = String(p.method).replace(/([A-Za-zÀ-ÿ])(?=\d)/g, '$1 ')
						bits.push(esc(m))
					}
					if (p.reference) bits.push(`<span class="muted">${esc(String(p.reference))}</span>`)
					const left = bits.length ? bits.join(' · ') : '<span class="muted">(Zahlung)</span>'
					const right = p.amount == null ? '–' : fmtMoney(p.amount, cur)
					return `<div class="row"><span>${left}</span><span class="num">${right}</span></div>`
				}).join('')
				return `<div class="invoice-bundle-label" style="margin:0 0 6px 0">Zahlungen</div>${rows}`
			}

			function renderOutstandingBlock(v, cur) {
				return `<div class="invoice-financials__outstanding" role="group" aria-label="Offener Betrag">
					<div class="invoice-root-outstanding-inner">
						<span class="invoice-root-outstanding-label">Offener Betrag</span>
						<span class="invoice-root-outstanding-value">${fmtMoney(v, cur)}</span>
					</div>
				</div>`
			}

			function renderPaymentInstructions(text) {
				return `<div class="invoice-card" style="margin-top:16px">
					<h4>Zahlungsinformationen</h4>
					<div class="line" style="white-space:pre-line">${esc(text)}</div>
				</div>`
			}

			function render() {
				if (!isInvoicePayload(state)) {
					$root.innerHTML = '<div class="invoice-ui-container"><div class="empty-doc" style="padding:2rem;text-align:center;color:var(--muted)">Ungültige Rechnungsdaten.</div></div>'
					return
				}
				const header = state.header
				const cur = isRecord(header) && typeof header.currency === 'string' ? header.currency : 'EUR'
				const invNum = isRecord(header) && typeof header.invoice_number === 'string' && header.invoice_number.trim()
					? header.invoice_number.trim() : ''
				const totals = state.totals
				let grand = null
				if (isRecord(totals) && typeof totals.invoice_total === 'number') grand = totals.invoice_total
				const docKind = isRecord(header) && header.document_kind != null
					? String(header.document_kind).replace(/_/g, ' ') : ''
				const issueD = isRecord(header) ? header.issue_date : null
				const dueD = isRecord(header) ? header.due_date : null
				const orderN = isRecord(header) ? header.order_number : null
				const custN = isRecord(header) ? header.customer_number : null
				const refs = isRecord(header) ? header.referenced_invoice_numbers : null

				let heroRow = ''
				if (invNum || grand != null) {
					const left = invNum && `<div class="inv-banner-hero-left inv-banner-hero-invoice">
						<div class="inv-banner-value inv-banner-kind">${esc(invNum)}</div>
						<div class="inv-banner-sublabel">Rechnungs-Nr.</div>
					</div>`
					const right = grand != null ? `<div class="inv-banner-hero-right">
						<div class="inv-banner-value inv-banner-money">${fmtMoney(grand, cur)}</div>
						<div class="inv-banner-sublabel">Gesamtbetrag</div>
					</div>` : ''
					heroRow = `<div class="inv-banner-hero-row${invNum ? '' : ' inv-banner-hero-only-right'}">${left || '<div></div>'}${right}</div>`
				}

				const midRightBits = []
				if (dueD) midRightBits.push(invBannerField(esc(fmtDate(dueD)), 'Fällig'))
				if (issueD) midRightBits.push(invBannerField(esc(fmtDate(issueD)), 'Ausstellungsdatum'))
				if (Array.isArray(refs) && refs.length) {
					midRightBits.push(invBannerField(refs.map((r) => esc(String(r))).join(' · '), 'Referenz'))
				}
				let midRow = ''
				if (docKind && midRightBits.length) {
					midRow = `<div class="inv-banner-mid inv-banner-mid--compact">
						<div class="inv-banner-mid-left">
							<div class="inv-banner-compact-value">${esc(docKind)}</div>
							<div class="inv-banner-compact-sublabel">Belegart</div>
						</div>
						<div class="inv-banner-mid-dates inv-banner-mid-dates--merged">${midRightBits.join('')}</div>
					</div>`
				} else if (docKind) {
					midRow = `<div class="inv-banner-mid inv-banner-mid--compact">
						<div class="inv-banner-mid-left">
							<div class="inv-banner-compact-value">${esc(docKind)}</div>
							<div class="inv-banner-compact-sublabel">Belegart</div>
						</div>
					</div>`
				} else if (midRightBits.length) {
					midRow = `<div class="inv-banner-mid inv-banner-mid--compact">
						<div class="inv-banner-mid-dates inv-banner-mid-dates--merged" style="justify-content:flex-end;width:100%">${midRightBits.join('')}</div>
					</div>`
				}

				const fieldBits = []
				if (orderN) fieldBits.push(invBannerField(esc(orderN), 'Auftrag / Projekt'))
				if (custN) fieldBits.push(invBannerField(esc(custN), 'Kundennr.'))
				const fieldsRow = fieldBits.length ? `<div class="inv-banner-fields-row">${fieldBits.join('')}</div>` : ''

				const banner = heroRow || midRow || fieldsRow
					? `<div class="invoice-doc-banner">${heroRow}${midRow}${fieldsRow}</div>` : ''

				const parties = `<div class="invoice-grid">
					${renderPartyCard(state.vendor, 'Lieferant')}
					${renderPartyCard(state.buyer, 'Käufer')}
				</div>`

				const stmts = Array.isArray(state.statements) ? state.statements : []
				let sectionsHtml = ''
				const singleStmt = stmts.length === 1
				for (let si = 0; si < stmts.length; si++) {
					const st = stmts[si]
					if (!isRecord(st)) continue
					const segClass = si > 0 ? ' invoice-segment' : ''
					const title = typeof st.section_title === 'string' ? st.section_title.trim() : ''
					const period = typeof st.service_period === 'string' ? st.service_period.trim() : ''
					let capInner = ''
					if (title && period) {
						capInner = `<div class="invoice-items-cap-title-row"><div class="invoice-cap-block invoice-cap-block--title">${esc(title)}</div><div class="invoice-items-cap-subline"><div class="invoice-cap-kv" role="group" aria-label="Leistungszeitraum"><span class="invoice-cap-k">LEISTUNGSZEITRAUM</span><span class="invoice-cap-v">${esc(period)}</span></div></div></div>`
					} else if (title) {
						capInner = `<div class="invoice-cap-block invoice-cap-block--title">${esc(title)}</div>`
					} else if (period) {
						capInner = `<div class="invoice-items-cap-title-row invoice-items-cap-title-row--subline-only"><div class="invoice-items-cap-subline"><div class="invoice-cap-kv" role="group" aria-label="Leistungszeitraum"><span class="invoice-cap-k">LEISTUNGSZEITRAUM</span><span class="invoice-cap-v">${esc(period)}</span></div></div></div>`
					}
					const cap = capInner
						? `<div class="invoice-items-cap invoice-items-cap--statement">${capInner}</div>` : ''
					const lineBody = renderLineRows(st.line_items, cur)
					const tbl = lineBody
						? `<table class="invoice-items" aria-label="Positionen"><thead><tr>
							<th class="idx">#</th><th>Pos.</th><th>Art.-Nr.</th><th>Bezeichnung</th>
							<th class="num">Menge</th><th>ME</th><th class="num">Einzelpreis</th>
							<th class="num">USt. %</th><th class="num">Betrag</th>
						</tr></thead><tbody>${lineBody}</tbody></table>` : ''
					const itemsWrap = (cap || tbl)
						? `<div class="invoice-items-wrap invoice-items-wrap--unified">${cap}${tbl}</div>` : ''
					let financials = ''
					if (singleStmt) {
						const totalsHtml = renderEmbeddedTotals(state.totals ?? {}, cur)
						const payHtml = renderPaymentsSection(state.payments, cur)
						const out = state.total_outstanding
						const outBlock = typeof out === 'number' ? renderOutstandingBlock(out, cur) : ''
						const finInner = [
							totalsHtml ? `<div class="invoice-financials__section invoice-financials__section--totals"><div class="invoice-totals invoice-totals--embedded">${totalsHtml}</div></div>` : '',
							payHtml ? `<div class="invoice-financials__section invoice-financials__section--payments">${payHtml}</div>` : '',
							outBlock
						].join('')
						if (finInner) {
							financials = `<div class="invoice-financials" role="group" aria-label="Zahlungen und Summen">${finInner}</div>`
						}
					}
					sectionsHtml += `<div class="invoice-block${segClass}">${itemsWrap}${financials}</div>`
				}

				const payInstr = state.payment_instructions
				const instrBlock = typeof payInstr === 'string' && payInstr.trim()
					? renderPaymentInstructions(payInstr.trim()) : ''
				$root.innerHTML = `<div class="invoice-ui-container">${banner}${parties}${sectionsHtml}${instrBlock}</div>`
			}

			const app = new App({ name: 'Aven Invoice viewer', version: '1.0.0' })

			async function pushModelContext() {
				const summary = isInvoicePayload(state) && isRecord(state.header) && typeof state.header.invoice_number === 'string'
					? `Rechnung ${state.header.invoice_number}` : 'Rechnung'
				await app.updateModelContext({
					structuredContent: state,
					content: [{ type: 'text', text: summary }]
				})
			}

			function applyConfig(cfg) {
				if (!isInvoicePayload(cfg)) return
				state = cloneJson(cfg)
				render()
				void pushModelContext()
			}

			app.ontoolinput = (params) => {
				const args =
					params && typeof params === 'object' && params.arguments !== undefined
						? params.arguments
						: params
				applyConfig(args)
			}
			app.ontoolresult = (result) => {
				const sc = result.structuredContent
				if (sc && isInvoicePayload(sc)) applyConfig(sc)
			}

			await app.connect()
			render()
			void pushModelContext()
			})().catch((err) => {
				console.error('[vibe-app invoice]', err)
				const r = document.getElementById('doc-root')
				if (r) {
					r.innerHTML =
						'<div class="invoice-ui-container"><div class="empty-doc" style="padding:2rem;text-align:center;color:#b91c1c">Vorschau konnte nicht starten: ' +
						String(err?.message ?? err) +
						'</div></div>'
				}
			})
		</script>
	</body>
</html>
