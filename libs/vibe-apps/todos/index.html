<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Todos — Aven</title>
		<style>
			/* Mirrors Aven CEO @theme tokens (host also injects MCP style variables). */
			:root {
				--bg-page: var(--color-background-primary, #e8ede1);
				--fg: var(--color-text-primary, #1a1a1a);
				--muted: var(--color-text-secondary, rgba(26, 26, 26, 0.45));
				--border: var(--color-border-primary, rgba(0, 0, 0, 0.1));
				--tuscan: var(--color-ring-info, #e6b34d);
				--fg-inverse: var(--color-text-inverse, #e8ede1);
				--radius: var(--border-radius-md, 1rem);
				--radius-lg: 1.5rem;
				--font: var(--font-sans, Inter, ui-sans-serif, system-ui, sans-serif);
				--card: rgba(255, 255, 255, 0.35);
				--card-hover: rgba(255, 255, 255, 0.5);
			}

			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				padding: 0;
				height: 100%;
				background: var(--bg-page);
				color: var(--fg);
				font-family: var(--font);
				letter-spacing: -0.02em;
			}

			#app {
				width: 100%;
				min-height: 100%;
				height: 100%;
				margin: 0;
				display: flex;
				flex-direction: column;
				gap: 1rem;
				padding: 16px;
				background: var(--card);
				border: none;
				border-radius: 0;
				box-shadow: none;
				backdrop-filter: blur(8px);
			}

			#list {
				list-style: none;
				margin: 0;
				padding: 0;
				display: flex;
				flex-direction: column;
				gap: 0.4rem;
				flex: 1;
				min-height: 0;
				overflow-y: auto;
			}
			header {
				display: flex;
				align-items: center;
				gap: 0.75rem;
				flex-shrink: 0;
			}
			header h1 {
				margin: 0;
				font-size: 1.125rem;
				font-weight: 600;
				letter-spacing: -0.03em;
			}

			button {
				font: inherit;
				color: inherit;
				background: rgba(255, 255, 255, 0.25);
				border: 1px solid var(--border);
				border-radius: var(--radius);
				padding: 0.4rem 0.65rem;
				cursor: pointer;
				transition: background 0.15s ease, border-color 0.15s ease;
			}
			button:hover {
				background: var(--card-hover);
			}
			button.primary {
				background: var(--tuscan);
				color: var(--fg);
				border-color: rgba(0, 0, 0, 0.08);
				font-weight: 600;
			}
			button.primary:hover {
				filter: brightness(1.03);
			}

			#add-form {
				display: flex;
				gap: 0.5rem;
				flex-shrink: 0;
			}
			#add-input {
				flex: 1;
				font: inherit;
				color: inherit;
				background: rgba(255, 255, 255, 0.4);
				border: 1px solid var(--border);
				border-radius: var(--radius);
				padding: 0.55rem 0.85rem;
				outline: none;
			}
			#add-input:focus {
				border-color: var(--tuscan);
				box-shadow: 0 0 0 2px rgba(230, 179, 77, 0.25);
			}

			.todo {
				display: flex;
				align-items: center;
				gap: 0.65rem;
				padding: 0.6rem 0.75rem;
				border: 1px solid var(--border);
				border-radius: var(--radius);
				background: rgba(255, 255, 255, 0.2);
				animation: slideIn 0.18s ease-out;
			}
			.todo.done .text {
				text-decoration: line-through;
				color: var(--muted);
			}
			.todo input[type='checkbox'] {
				width: 1.05rem;
				height: 1.05rem;
				accent-color: var(--tuscan);
				cursor: pointer;
			}
			.todo .text {
				flex: 1;
				outline: none;
				padding: 0.15rem 0.35rem;
				border-radius: 0.35rem;
				white-space: pre-wrap;
				word-break: break-word;
			}
			.todo .text:focus {
				background: rgba(230, 179, 77, 0.12);
			}
			.todo .delete {
				border: none;
				background: transparent;
				color: var(--muted);
				font-size: 1.15rem;
				line-height: 1;
				padding: 0.2rem 0.45rem;
			}
			.todo .delete:hover {
				color: #b45309;
			}

			footer {
				display: flex;
				align-items: center;
				justify-content: space-between;
				font-size: 0.75rem;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.08em;
				font-weight: 600;
				gap: 0.5rem;
				flex-shrink: 0;
			}

			.empty {
				text-align: center;
				color: var(--muted);
				padding: 1.35rem;
				border: 1px dashed var(--border);
				border-radius: var(--radius);
				font-size: 0.9rem;
			}

			@keyframes slideIn {
				from {
					opacity: 0;
					transform: translateY(-3px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}
		</style>
	</head>
	<body>
		<main id="app">
			<header>
				<h1 id="title">Todos</h1>
			</header>

			<form id="add-form">
				<input id="add-input" type="text" placeholder="Add a todo…" required />
				<button class="primary" type="submit">Add</button>
			</form>

			<ul id="list"></ul>

			<footer>
				<span id="count">0 of 0 remaining</span>
				<button id="clear-done-btn" type="button">Clear done</button>
			</footer>
		</main>

		<script type="module" src="./src/main.ts"></script>
	</body>
</html>
