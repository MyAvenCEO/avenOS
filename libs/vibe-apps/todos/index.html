<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Aufgaben — Aven</title>
	</head>
	<body>
		<div id="doc-root">
			<main class="td-ui-container">
				<section class="td-card">
					<div class="td-banner-grid">
						<div>
							<span class="td-eyebrow">Aufgabenliste</span>
							<h1 id="title" class="td-banner-title">Aufgaben</h1>
						</div>
						<div class="td-banner-stat">
							<span class="td-field-label">Offen</span>
							<div id="count" class="td-banner-accent">0 von 0</div>
						</div>
					</div>
				</section>

				<section class="td-card">
					<h4>Neu</h4>
					<form id="add-form" class="td-add-form">
						<input
							id="add-input"
							class="td-input"
							type="text"
							placeholder="Aufgabe beschreiben …"
							required
							autocomplete="off"
						>
						<button class="td-btn td-btn--primary" type="submit">Hinzufügen</button>
					</form>
				</section>

				<section class="td-card td-card--list">
					<h4>Einträge</h4>
					<ul id="list" class="td-list"></ul>
					<div class="td-list-footer">
						<button id="clear-done-btn" class="td-btn td-btn--ghost" type="button">
							Erledigte löschen
						</button>
					</div>
				</section>
			</main>
		</div>
		<script type="module" src="./src/main.ts"></script>
	</body>
</html>
