<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Kontoauszug — Aven</title>
		<style>
			/* Aven CEO tech-card + HITL dashed panels (aligned with invoice vibe app) */
			:root {
				/* Outer page background — clean near-white that visually approximates
				   the docs-card surface (Tailwind `bg-white/10` over the cream page,
				   #F8F6EF) used by the Display panel iframe wrapper in app. The
				   Display panel layers `bg-white/10` over the page cream and renders
				   as a subtle translucent near-white; vibe apps inside the iframe have
				   no parent transparency, so this is a literal hex chosen to match
				   that perceived tone. Slightly cooler/cleaner than the legacy
				   eggshell display surface (#F9F5E6, `--color-surface-soft` in
				   app) — that token is no longer used by the active panel and
				   has been replaced by the docs-card tone here for visual parity.
				   Hard-coded because vibe apps are bundled into the sandbox
				   independently of app's CSS variables. */
				--bg-a: #FBFAF6;
				--tech-fill: rgba(255, 255, 255, 0.1);
				--tech-fill-inner: rgba(255, 255, 255, 0.15);
				--hitl-dash: color-mix(in srgb, var(--text) 20%, transparent);
				--border: var(--color-border-primary, rgba(0, 0, 0, 0.1));
				--border-soft: color-mix(in srgb, var(--border) 35%, transparent);
				--muted: var(--color-text-secondary, rgba(26, 26, 26, 0.45));
				--text: var(--color-text-primary, #1a1a1a);
				--brand-accent: var(--color-ring-info, #e6b34d);
				--row-divider: color-mix(in srgb, var(--border) 55%, transparent);
				--radius-2xl: var(--border-radius-2xl, 2rem);
				--radius-md: var(--border-radius-md, 1rem);
			}

			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				min-height: 100%;
				height: 100%;
			}
			body {
				font-family: var(
					--font-sans,
					'Inter',
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					Roboto,
					sans-serif
				);
				background: var(--bg-a);
				color: var(--text);
			}
			#doc-root {
				min-height: 100%;
				width: 100%;
				margin: 0;
				padding: 0;
			}

			.bs-ui-container {
				padding: 1.25rem 1.5rem;
				border-radius: var(--radius-2xl);
				background: var(--tech-fill);
				border: none;
			}

			.bs-card {
				background: var(--tech-fill);
				border: 1px dashed var(--hitl-dash);
				border-radius: var(--radius-2xl);
				padding: 18px 20px;
				margin-bottom: 16px;
			}
			.bs-card h4 {
				margin: 0 0 8px 0;
				font-size: 10px;
				font-weight: 700;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.12em;
				opacity: 0.55;
			}
			.bs-card .big {
				font-size: 15px;
				font-weight: 700;
				color: var(--text);
				margin-bottom: 4px;
			}
			.bs-card .line {
				font-size: 13px;
				color: var(--text);
				margin-top: 2px;
				white-space: pre-wrap;
				word-break: break-word;
			}
			.bs-card .muted {
				color: var(--muted);
				font-size: 12px;
				margin-top: 2px;
			}

			.bs-grid {
				display: grid;
				gap: 16px;
				grid-template-columns: 1fr 1fr;
				margin-bottom: 16px;
			}
			@media (max-width: 760px) {
				.bs-grid {
					grid-template-columns: 1fr;
				}
			}

			.bs-banner {
				background: var(--tech-fill-inner);
				border: 1px dashed var(--hitl-dash);
				border-radius: var(--radius-2xl);
				padding: 14px 20px;
				margin-bottom: 16px;
				font-size: 13px;
			}
			.bs-banner-header {
				display: block;
			}
			.bs-banner-subheader {
				display: block;
			}
			.bs-banner-hero {
				display: grid;
				grid-template-columns: 1fr auto;
				gap: 12px 24px;
				align-items: end;
			}
			@media (max-width: 560px) {
				.bs-banner-hero {
					grid-template-columns: 1fr;
				}
			}
			.bs-banner-title {
				font-size: 1.1rem;
				font-weight: 800;
				letter-spacing: -0.02em;
				color: var(--text);
				text-transform: capitalize;
			}
			.bs-banner-sub {
				font-size: 10px;
				font-weight: 700;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.08em;
				margin-top: 6px;
			}
			.bs-banner-money {
				font-size: 1.35rem;
				font-weight: 800;
				font-family: ui-monospace, Menlo, monospace;
				font-variant-numeric: tabular-nums;
				color: var(--brand-accent);
				text-align: right;
			}
			.bs-banner-money .bs-banner-sub {
				text-align: right;
			}
			.bs-field-label {
				font-size: 9px;
				font-weight: 700;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.06em;
				margin-top: 4px;
			}
			.bs-field-val {
				font-size: 0.95rem;
				font-weight: 700;
				font-family: ui-monospace, Menlo, monospace;
				font-variant-numeric: tabular-nums;
			}
			.bs-banner-fields {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
				gap: 10px 18px;
				margin-top: 12px;
				padding-top: 10px;
				border-top: 1px solid color-mix(in srgb, var(--text) 12%, transparent);
			}
			.bs-banner-fields--compact {
				justify-content: start;
				justify-items: start;
				grid-template-columns: repeat(auto-fill, minmax(108px, max-content));
				gap: 10px 14px;
			}
			.bs-banner-fields--compact .bs-field-val {
				font-size: 0.8125rem;
				font-weight: 700;
				line-height: 1.25;
			}
			.bs-banner-fields--compact .bs-field-cell--nowrap .bs-field-val {
				white-space: nowrap;
			}
			.bs-items-wrap {
				background: var(--tech-fill);
				border: 1px dashed var(--hitl-dash);
				border-radius: var(--radius-2xl);
				overflow: auto;
				margin-bottom: 16px;
			}
			.bs-items {
				width: 100%;
				border-collapse: collapse;
				font-size: 13px;
			}
			.bs-items thead th {
				text-align: left;
				background: var(--tech-fill-inner);
				padding: 10px 12px;
				border-bottom: 1px solid var(--border-soft);
				font-weight: 700;
				font-size: 10px;
				text-transform: uppercase;
				letter-spacing: 0.05em;
				color: var(--muted);
			}
			.bs-items thead th.num {
				text-align: right;
			}
			.bs-items tbody td {
				padding: 10px 12px;
				border-bottom: 1px solid var(--row-divider);
				vertical-align: top;
			}
			.bs-items tbody tr:last-child td {
				border-bottom: none;
			}
			.bs-items .num {
				text-align: right;
				font-family: ui-monospace, Menlo, monospace;
				font-variant-numeric: tabular-nums;
				white-space: nowrap;
			}
			.bs-items .num--neg {
				color: color-mix(in srgb, var(--text) 75%, #b91c1c);
			}
			.bs-desc-title {
				font-weight: 700;
				color: var(--text);
				line-height: 1.35;
			}
			.bs-desc-body {
				font-size: 12px;
				color: var(--muted);
				line-height: 1.45;
				margin-top: 3px;
				white-space: pre-line;
			}
			.bs-fx-hint {
				font-size: 10px;
				color: var(--muted);
				margin-top: 4px;
				font-style: italic;
			}

			.bs-notes {
				font-size: 13px;
				line-height: 1.5;
				white-space: pre-line;
				color: var(--text);
			}
		</style>
	</head>
	<body>
		<div id="doc-root">
			<div class="bs-ui-container">
				<div class="empty-doc" style="padding: 2rem; text-align: center; color: var(--muted)">Lade …</div>
			</div>
		</div>

		<script type="module">
			;(async () => {
			const extOrigin = window.parent?.location?.origin ?? window.location.origin
			const { App } = await import(`${extOrigin}/ext-apps.js`)

			const $root = document.getElementById('doc-root')
			let state = {}

			const cloneJson = (x) => JSON.parse(JSON.stringify(x))
			const isRecord = (x) => typeof x === 'object' && x !== null
			const esc = (s) => {
				if (s == null) return ''
				return String(s)
					.replace(/&/g, '&amp;')
					.replace(/</g, '&lt;')
					.replace(/>/g, '&gt;')
					.replace(/"/g, '&quot;')
			}
			const fmtNum = (n) => new Intl.NumberFormat('de-DE', { maximumFractionDigits: 2 }).format(n)
			const fmtDate = (s) => {
				if (s == null || typeof s !== 'string' || !s.trim()) return ''
				const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s.trim())
				if (m) {
					const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]))
					if (!Number.isNaN(d.getTime())) {
						return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })
					}
				}
				return s.trim()
			}
			const fmtMoney = (n, currency) => {
				if (n == null || typeof n !== 'number' || Number.isNaN(n)) return '–'
				try {
					return new Intl.NumberFormat('de-DE', { style: 'currency', currency: currency || 'EUR' }).format(n)
				} catch {
					return `${fmtNum(n)} ${currency}`
				}
			}

			const STATEMENT_KIND_LABELS = {
				periodic_account_statement: 'Kontoauszug (periodisch)',
				fee_or_service_statement: 'Gebühren- / Serviceauszug',
				credit_card_statement: 'Kreditkartenabrechnung',
				savings_account_statement: 'Sparkontoauszug',
				other: 'Sonstiges'
			}

			function statementKindLabel(k) {
				if (k == null || typeof k !== 'string' || !k.trim()) return 'Kontoauszug'
				return STATEMENT_KIND_LABELS[k] ?? k.replace(/_/g, ' ')
			}

			function isBankStatementPayload(x) {
				if (!isRecord(x)) return false
				const cur = x.currency
				const holder = x.account_holder
				const inst = x.institution
				const overview = x.account_overview
				const tx = x.transactions
				if (typeof cur !== 'string' || !cur.trim()) return false
				if (!isRecord(holder) || typeof holder.name !== 'string') return false
				if (!isRecord(inst) || typeof inst.name !== 'string') return false
				if (!isRecord(overview)) return false
				if (!Array.isArray(tx)) return false
				return true
			}

			function renderPartyCard(party, roleTitle, footerHtml = '') {
				const name = typeof party.name === 'string' ? party.name : '–'
				const contact = typeof party.contact_name === 'string' ? party.contact_name.trim() : ''
				const contactBlock = contact
					? `<div class="muted" style="margin-top:4px">Ansprechpartner: ${esc(contact)}</div>`
					: ''
				const street = typeof party.street === 'string' ? party.street : ''
				const pc = typeof party.postal_code === 'string' ? party.postal_code : ''
				const city = typeof party.city === 'string' ? party.city : ''
				const country = typeof party.country === 'string' ? party.country : ''
				const plzCity = [pc, city].filter(Boolean).join(' ')
				const addrBits = []
				if (street) addrBits.push(`<div class="line">${esc(street)}</div>`)
				if (plzCity) addrBits.push(`<div class="line">${esc(plzCity)}</div>`)
				if (country) addrBits.push(`<div class="muted">${esc(country)}</div>`)
				const addressBlock = addrBits.length ? addrBits.join('') : ''
				const email = party.email
				const phone = party.phone
				const tax = party.tax_id
				const taxLine =
					typeof tax === 'string' && tax.trim()
						? `<div class="muted" style="margin-top:6px">${esc(tax.trim())}</div>`
						: ''
				return `<div class="bs-card">
  <h4>${esc(roleTitle)}</h4>
  <div class="big">${esc(name)}</div>
  ${contactBlock}
  ${addressBlock}
  ${typeof email === 'string' && email ? `<div class="muted">${esc(email)}</div>` : ''}
  ${typeof phone === 'string' && phone ? `<div class="muted">${esc(phone)}</div>` : ''}
  ${taxLine}
  ${footerHtml}
</div>`
			}

			function renderTxnRows(transactions, cur) {
				return transactions
					.map((raw) => {
						if (!isRecord(raw)) return ''
						const booking = fmtDate(raw.booking_date)
						const valueD = fmtDate(raw.value_date)
						const title = typeof raw.title === 'string' ? raw.title.trim() : ''
						const desc = typeof raw.description === 'string' ? raw.description.trim() : ''
						let descCell = ''
						if (title && desc) {
							descCell = `<div class="bs-desc-title">${esc(title)}</div><div class="bs-desc-body">${esc(desc)}</div>`
						} else if (title) {
							descCell = `<div class="bs-desc-title">${esc(title)}</div>`
						} else {
							descCell = `<div class="bs-desc-body">${esc(desc)}</div>`
						}
						const amt = raw.amount
						const amtNum = typeof amt === 'number' && !Number.isNaN(amt) ? amt : null
						const amtCls = amtNum != null && amtNum < 0 ? 'num num--neg' : 'num'
						const fxBits = []
						if (raw.original_amount != null && raw.original_currency) {
							fxBits.push(
								`${fmtMoney(raw.original_amount, String(raw.original_currency))} · Kurs ${esc(raw.exchange_rate ?? '–')}`
							)
						}
						if (raw.fx_surcharge_eur != null && typeof raw.fx_surcharge_eur === 'number') {
							fxBits.push(`FX-Gebühr EUR ${fmtMoney(raw.fx_surcharge_eur, cur)}`)
						}
						if (
							raw.foreign_exchange_fee_percent != null &&
							typeof raw.foreign_exchange_fee_percent === 'number'
						) {
							fxBits.push(`${fmtNum(raw.foreign_exchange_fee_percent)}% Umrechnung`)
						}
						const fxHtml = fxBits.length ? `<div class="bs-fx-hint">${esc(fxBits.join(' · '))}</div>` : ''
						const bal = raw.balance_after
						const rate = raw.exchange_rate
						return `<tr>
  <td>${esc(booking)}</td>
  <td>${esc(valueD)}</td>
  <td>${descCell}${fxHtml}</td>
  <td class="${amtCls}">${fmtMoney(amt, cur)}</td>
  <td class="num">${bal != null && typeof bal === 'number' ? fmtMoney(bal, cur) : '–'}</td>
  <td class="num">${rate != null && String(rate).trim() ? esc(String(rate)) : '–'}</td>
</tr>`
					})
					.join('')
			}

			function render() {
				if (!$root) return
				if (!isBankStatementPayload(state)) {
					$root.innerHTML =
						'<div class="bs-ui-container"><div class="empty-doc" style="padding:2rem;text-align:center;color:var(--muted)">Ungültige Kontoauszugsdaten.</div></div>'
					return
				}

				const cur = typeof state.currency === 'string' ? state.currency : 'EUR'
				const kindLabel = statementKindLabel(state.statement_kind)
				const periodFrom = fmtDate(state.period_start)
				const periodTo = fmtDate(state.period_end)
				const issueD = fmtDate(state.statement_issue_date)
				const dueD = fmtDate(state.payment_due_date)
				const stmtId =
					typeof state.statement_id === 'string' && state.statement_id.trim()
						? state.statement_id.trim()
						: ''
				const openB = state.opening_balance
				const closeB = state.closing_balance
				const overview = isRecord(state.account_overview) ? state.account_overview : {}
				const iban = typeof overview.iban === 'string' ? overview.iban.trim() : ''

				const heroLeft = stmtId
					? `<div><div class="bs-banner-title">${esc(stmtId)}</div><div class="bs-banner-sub">Auszugs-Nr.</div></div>`
					: `<div><div class="bs-banner-title">Kontoauszug</div><div class="bs-banner-sub">Dokument</div></div>`

				const heroRight =
					closeB != null && typeof closeB === 'number'
						? `<div class="bs-banner-money"><div>${fmtMoney(closeB, cur)}</div><div class="bs-banner-sub">Schlusssaldo</div></div>`
						: ''

				const line2Rows = []
				const line3Rows = []
				function addField(target, label, val, money = false, nowrap = false) {
					if (val == null) return
					if (typeof val === 'number' && Number.isNaN(val)) return
					const shown =
						money && typeof val === 'number'
							? fmtMoney(val, cur)
							: typeof val === 'string'
								? val
								: String(val)
					if (typeof shown === 'string' && !shown.trim()) return
					const cellMod = nowrap ? ' bs-field-cell--nowrap' : ''
					target.push(
						`<div class="bs-field-cell${cellMod}"><div class="bs-field-val">${esc(shown)}</div><div class="bs-field-label">${esc(label)}</div></div>`
					)
				}

				const periodRange =
					periodFrom && periodTo ? `${periodFrom} – ${periodTo}` : periodFrom || periodTo || null

				addField(line3Rows, 'Auszugsart', kindLabel)
				addField(line3Rows, 'Zeitraum', periodRange)
				addField(line3Rows, 'Anfangssaldo', openB, true)
				addField(line3Rows, 'Ausstellungsdatum', issueD || null)
				addField(line3Rows, 'Zahlungsfrist', dueD || null)

				addField(line2Rows, 'BIC / SWIFT', overview.bic)
				addField(line2Rows, 'Bankleitzahl', overview.domestic_bank_code)
				addField(line2Rows, 'Kontonummer', overview.account_number)
				addField(line2Rows, 'Produkt', overview.product_name)
				addField(line2Rows, 'Karte (letzte 4)', overview.card_last_four)
				addField(line2Rows, 'IBAN', iban || null, false, true)

				const bannerLine2 =
					line2Rows.length > 0
						? `<div class="bs-banner-fields bs-banner-fields--compact">${line2Rows.join('')}</div>`
						: ''

				const bannerLine3 =
					line3Rows.length > 0
						? `<div class="bs-banner-fields bs-banner-fields--compact">${line3Rows.join('')}</div>`
						: ''

				const banner = `<div class="bs-banner">
  <header class="bs-banner-header">
    <div class="bs-banner-hero">
      ${heroLeft}
      ${heroRight}
    </div>
  </header>
  <div class="bs-banner-subheader">
    ${bannerLine2}
    ${bannerLine3}
  </div>
</div>`

				const holder = isRecord(state.account_holder) ? state.account_holder : {}
				const inst = isRecord(state.institution) ? state.institution : {}
				const branchFooter =
					typeof overview.branch_name === 'string' && overview.branch_name.trim()
						? `<div class="muted" style="margin-top:8px">Filiale: ${esc(overview.branch_name.trim())}</div>`
						: ''
				const instCard = renderPartyCard(inst, 'Institut', branchFooter)

				const parties = `<div class="bs-grid">${renderPartyCard(holder, 'Kontoinhaber')}${instCard}</div>`

				const tx = state.transactions
				const txBody = renderTxnRows(tx, cur)
				const table = txBody
					? `<div class="bs-items-wrap"><table class="bs-items" aria-label="Umsätze">
<thead><tr>
  <th>Buchungsdatum</th>
  <th>Wertstellung</th>
  <th>Verwendungszweck</th>
  <th class="num">Betrag</th>
  <th class="num">Saldo</th>
  <th class="num">Kurs</th>
</tr></thead><tbody>${txBody}</tbody></table></div>`
					: ''

				const notesRaw = state.notes
				const notesBlock =
					typeof notesRaw === 'string' && notesRaw.trim()
						? `<div class="bs-card"><h4>Hinweise</h4><div class="bs-notes">${esc(notesRaw.trim())}</div></div>`
						: ''

				$root.innerHTML = `<div class="bs-ui-container">${banner}${parties}${table}${notesBlock}</div>`
			}

			const app = new App({ name: 'Aven Kontoauszug', version: '1.0.0' })

			async function pushModelContext() {
				const summary =
					isBankStatementPayload(state) &&
					typeof state.statement_id === 'string' &&
					state.statement_id.trim()
						? `Kontoauszug ${state.statement_id.trim()}`
						: 'Kontoauszug'
				await app.updateModelContext({
					structuredContent: state,
					content: [{ type: 'text', text: summary }]
				})
			}

			function applyConfig(cfg) {
				if (!isBankStatementPayload(cfg)) return
				state = cloneJson(cfg)
				render()
				void pushModelContext()
			}

			app.ontoolinput = (params) => {
				const args =
					params && typeof params === 'object' && params.arguments !== undefined
						? params.arguments
						: params
				applyConfig(args)
			}
			app.ontoolresult = (result) => {
				const sc = result.structuredContent
				if (sc && isBankStatementPayload(sc)) applyConfig(sc)
			}

			await app.connect()
			render()
			void pushModelContext()
			})().catch((err) => {
				console.error('[vibe-app bank-statement]', err)
				const r = document.getElementById('doc-root')
				if (r) {
					r.innerHTML =
						'<div class="bs-ui-container"><div class="empty-doc" style="padding:2rem;text-align:center;color:#b91c1c">Vorschau konnte nicht starten: ' +
						String(err?.message ?? err) +
						'</div></div>'
				}
			})
		</script>
	</body>
</html>
