<!doctype html>
<html lang="en" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #04060a;
        font-family: "Inter", system-ui, sans-serif;
        color: #fff;
      }
      #root { position: relative; width: 1080px; height: 1920px; }

      #bg {
        position: absolute;
        inset: 0;
        width: 1080px;
        height: 1920px;
        object-fit: cover;
      }
      /* darken top & bottom so text always reads */
      #grad {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.55) 0%,
          rgba(0, 0, 0, 0.05) 32%,
          rgba(0, 0, 0, 0.1) 60%,
          rgba(0, 0, 0, 0.75) 100%
        );
      }

      .center {
        position: absolute;
        left: 80px;
        right: 80px;
        text-align: center;
        text-shadow: 0 4px 28px rgba(0, 0, 0, 0.55);
      }
      #hook   { top: 360px; font-size: 104px; font-weight: 800; letter-spacing: -2px; line-height: 1.05; }
      #reveal { top: 360px; font-size: 96px;  font-weight: 800; letter-spacing: -2px; line-height: 1.08; }
      #reveal .accent { color: #cfff05; }

      /* big stat lower-third */
      #stat {
        position: absolute;
        left: 80px; right: 80px;
        bottom: 360px;
        text-align: center;
        text-shadow: 0 4px 28px rgba(0, 0, 0, 0.6);
      }
      #stat .num { display: block; font-size: 200px; font-weight: 900; color: #cfff05; line-height: 1; }
      #stat .label { display: block; margin-top: 12px; font-size: 46px; font-weight: 600; color: #eafff0; }

      #cta { bottom: 300px; top: auto; font-size: 58px; font-weight: 600; color: #f3f7ff; }
    </style>
  </head>
  <body>
    <!--
      "Every other breath" — 10s vertical short. Ocean b-roll from Pexels
      (assets/stock_09152309.mp4, by Gökhan Yıldız) + animated text.
      See script.md for the screenplay.
    -->
    <div
      id="root"
      data-composition-id="ocean-breath"
      data-start="0"
      data-duration="10.5"
      data-width="1080"
      data-height="1920"
    >
      <video
        id="bg"
        class="clip"
        data-start="0"
        data-duration="10.5"
        data-track-index="0"
        src="assets/stock_09152309.mp4"
        muted
        playsinline
      ></video>

      <!-- MOSS-TTS-Nano voiceover (generated by libs/aven-ai tts_synth, "Bella" voice) -->
      <audio
        id="vo"
        class="clip"
        data-start="0"
        data-duration="10.5"
        data-track-index="5"
        data-volume="1"
        src="assets/vo.wav"
      ></audio>

      <div id="grad" class="clip" data-start="0" data-duration="10" data-track-index="1"></div>

      <h1 id="hook" class="center clip" data-start="0" data-duration="3" data-track-index="2">
        Take a deep breath.
      </h1>

      <h1 id="reveal" class="center clip" data-start="3" data-duration="3.5" data-track-index="2">
        Half of it came from <span class="accent">the ocean.</span>
      </h1>

      <div id="stat" class="clip" data-start="5" data-duration="3.5" data-track-index="3">
        <span class="num">~50%</span>
        <span class="label">of Earth's oxygen</span>
      </div>

      <h2 id="cta" class="center clip" data-start="7" data-duration="3.5" data-track-index="2">
        Tiny plankton. Every other breath.
      </h2>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // slow push-in on the footage across the whole clip
      tl.fromTo("#bg", { scale: 1.0 }, { scale: 1.12, duration: 10.5, ease: "none" }, 0);

      // Hook (0–3)
      tl.from("#hook", { opacity: 0, y: 50, duration: 0.9, ease: "power3.out" }, 0.1);
      tl.to("#hook", { opacity: 0, duration: 0.4, ease: "power1.in" }, 2.6);
      tl.set("#hook", { opacity: 0 }, 3.0); // hard kill at clip boundary

      // Reveal (3–6.5) — "the ocean" gets a scale punch
      tl.from("#reveal", { opacity: 0, y: 40, duration: 0.8, ease: "power3.out" }, 3.1);
      tl.fromTo("#reveal .accent", { scale: 0.9 }, { scale: 1.08, duration: 0.5, ease: "back.out(2)" }, 3.5);
      tl.to("#reveal", { opacity: 0, duration: 0.4, ease: "power1.in" }, 6.1);
      tl.set("#reveal", { opacity: 0 }, 6.5); // hard kill at clip boundary

      // Stat (5–8.5) — springs up from below
      tl.from("#stat", { opacity: 0, y: 60, duration: 0.7, ease: "back.out(1.6)" }, 5.1);
      tl.to("#stat", { opacity: 0, duration: 0.4, ease: "power1.in" }, 8.1);
      tl.set("#stat", { opacity: 0 }, 8.5); // hard kill at clip boundary

      // CTA (7–10) — calm landing
      tl.from("#cta", { opacity: 0, y: 30, duration: 0.9, ease: "power2.out" }, 7.1);

      window.__timelines["ocean-breath"] = tl;
    </script>
  </body>
</html>
